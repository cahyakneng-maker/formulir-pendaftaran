<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Buat Formulir Pendaftaran</title>
</head>
<body>
    <h1>Formulir Pendaftaran</h1>
    
    <form action="">
        <label for="NISN">NISN</label>
        <input type="text" name="NISN" placeholder="Masukan NISN">
        <br>
        <label for="Nama">Nama</label>
        <input type="text" name="Nama" placeholder="Masukan Nama">
        <br>
        <label for="Alamat">Alamat</label>
        <input type="text" name="Alamat" placeholder="Masukan Alamat">
        <br>
        <label for="email">Email</label>
        <input type="email" name="email" placeholder="Masukan Email">
        <br>
        <label for="password">Password</label>
        <input type="password" name="password" placeholder="Masukan Password">
        <br>
        <label for="telepon">Telepon</label>
        <input type="tel" name="telepon" placeholder="Masukan Telepon">
        <br>
        <label for="Alamat">Alamat</label>
        <textarea name="alamat" id="" rows="10"></textarea>
        <br>
        <label for="file">upload file</label>
        <input type="file" name="file" id="">
        <br>
        <label for="file">jenis</label>
        <input type="radio" name="jenis" id="laki-laki"
        <label for="laki-laki">laki - l laki</label>
        <input type="radio" name="jenis" id="perempuan">
        <label for="perempuan">perempuan</label>
        <br>
        <label for="jenis">jenis kelamin</label>
        <select name="jenis" id="">
            <option value="laki-laki">laki-laki</option>
            <option value="perempuan">perempuan</option>
        </select>
    </form>
</body>
</html
